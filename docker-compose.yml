services:
  dev-container:
    container_name: dev-container
    hostname: dev-container
    build:
      context: .
      args:
        USERNAME: ${USER}
    ports:
      - "127.0.0.1:2222:22"
    volumes:
      - ${HOME}/code:/home/${USER}/code
      - ${HOME}/.ssh/id_ed25519.pub:/tmp/id_ed25519.pub:ro
      - ./data/certs:/usr/local/share/ca-certificates/extra:ro
    command: >
      sh -c "mkdir -p ~/.ssh &&
             cp /tmp/id_ed25519.pub ~/.ssh/authorized_keys &&
             cp /tmp/id_ed25519.pub ~/.ssh/id_ed25519.pub &&
             chmod 700 ~/.ssh && chmod 600 ~/.ssh/authorized_keys &&
             sudo mkdir -p /run/sshd &&
             sudo update-ca-certificates >/dev/null &&
             sudo /usr/sbin/sshd -D"
    restart: always
