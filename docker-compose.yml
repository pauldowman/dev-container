services:
  dev-container:
    container_name: dev-container
    hostname: dev-container
    build:
      context: .
      dockerfile: ${DOCKERFILE:-Dockerfile}
      args:
        USERNAME: ${USER}
    image: dev-container:latest
    ports:
      - "127.0.0.1:2222:22"
    environment:
      - SSH_AUTHORIZED_KEYS
    volumes:
      - ${HOME}/code:/home/${USER}/code
      - ./data/certs:/usr/local/share/ca-certificates/extra:ro
    restart: always
