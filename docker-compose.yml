services:
  dev-container:
    container_name: dev-container
    hostname: dev-container
    build:
      context: .
      dockerfile: ${DOCKERFILE:-Dockerfile}
      args:
        USERNAME: ${USERNAME:-$USER}
        DOTFILES_REPO: ${DOTFILES_REPO:-}
        DOTFILES_INSTALL_CMD: ${DOTFILES_INSTALL_CMD:-./install.sh}
    image: dev-container:latest
    ports:
      - "127.0.0.1:2222:22"
    environment:
      - SSH_AUTHORIZED_KEYS
      - TZ
      - CODE_DIR
    volumes:
      - home:/home/${USERNAME:-$USER}
      - ${CODE_DIR:?Set CODE_DIR in .env}:${CODE_DIR}
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/certs:/usr/local/share/ca-certificates/extra:ro
      - /etc/localtime:/etc/localtime:ro
    restart: always

volumes:
  home:
